spring:
  main:
    web-application-type: none
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

app:
  naver:
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN}
    chat-id: ${TELEGRAM_CHAT_ID}
    alert-player-names: ${TELEGRAM_ALERT_PLAYER_NAMES:변준형}
  news:
    mode: ${APP_NEWS_MODE:watch}
    from-date: ${APP_NEWS_FROM_DATE:2026-05-18}
    sort: date
    watch:
      display: 20
      queries:
        - KBL FA
        - 프로농구 FA
        - 자유계약선수
        - 변준형
        - 정관장 FA
    backfill:
      display: 100

logging:
  level:
    com.byun.newsalert: INFO
    root: INFO
