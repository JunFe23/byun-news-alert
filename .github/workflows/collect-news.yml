name: Collect KBL FA News

on:
    # Primary trigger is external cron-job.org via workflow_dispatch. Native schedule is fallback.
    # UTC. 정각 혼잡을 피하기 위해 매시 13분에 1회 실행 (fallback)
    schedule:
        - cron: '13 * * * *'
    workflow_dispatch:

concurrency:
    group: collect-kbl-fa-news
    cancel-in-progress: false

jobs:
    collect:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: collector

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21

            - name: Grant execute permission for gradlew
              run: chmod +x ./gradlew

            - name: Run collector
              run: ./gradlew bootRun --no-daemon
              env:
                  APP_NEWS_MODE: watch
                  APP_NEWS_FROM_DATE: '2026-05-18'
                  TELEGRAM_ALERT_PLAYER_NAMES: 변준형
                  NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
                  NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
                  SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
                  SUPABASE_DB_USERNAME: ${{ secrets.SUPABASE_DB_USERNAME }}
                  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
                  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
                  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
